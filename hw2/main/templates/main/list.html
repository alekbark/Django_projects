{% extends 'main/base.html' %}

{% block content %}

<h2>Items</h2>

<ol>
  {% for item in items %}
    <li>
      <a href="/items/{{ item.id }}/">{{ item.title }}</a>
      <ul>
        <li>ID: {{ item.id }}</li>
        <li>User: {{ item.userId }}</li>
      </ul>
    </li>
  {% endfor %}
</ol>

{% endblock %}
