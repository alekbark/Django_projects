{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<h2>Login</h2>

<form method="post">
  {% csrf_token %}
  <input type="text" placeholder="Username" class="form-control mb-2">
  <input type="password" placeholder="Password" class="form-control mb-2">
  <button class="btn btn-primary">Login</button>
</form>

{% endblock %}
