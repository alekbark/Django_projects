{% extends "base.html" %}

{% block content %}

<h1>Документы</h1>

<table class="table">

  <thead>
    <tr>
      <th>Название</th>
      <th>Файл</th>
      <th>Дата загрузки</th>
    </tr>
  </thead>

  <tbody>

  {% for document in documents %}

    <tr>

      <td>
        {{ document.title }}
      </td>

      <td>
        <a href="{{ document.file.url }}">
          Скачать
        </a>
      </td>

      <td>
        {{ document.created_at }}
      </td>
    </tr>

  {% endfor %}

  </tbody>

</table>

{% endblock %}
