{% extends 'tasks/base.html' %}

{% block title %}Создание задачи{% endblock %}

{% block content %}

<h1 class="mb-3">Создание задачи</h1>

<form method="POST">

    {% csrf_token %}

    <div class="mb-3">
        <input class="form-control" type="text" name="title" placeholder="Задача">
    </div>

    <div class="mb-3">
        <textarea class="form-control" name="description" placeholder="Описание"></textarea>
    </div>

    <div>
        <button class="btn mb-3 btn-primary" type="submit">Создать</button>
    </div>

</form>

<a href="{% url 'task_list' %}" class="btn btn-secondary">Назад</a>

{% endblock %}
