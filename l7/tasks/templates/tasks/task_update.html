{% extends 'tasks/base.html' %}

{% block title %}Обновление задачи{% endblock %}

{% block content %}

<h1 class="mb-3">Обновление задачи</h1>

<form method="POST">

    {% csrf_token %}

    <div class="mb-3">
        <input class="form-control" type="text" name="title" placeholder="Задача" value="{{ task.title }}">
    </div>

    <div class="mb-3">
        <textarea class="form-control" name="description" placeholder="Описание">{{ task.description }}</textarea>
    </div>

    <div>
        <button class="btn mb-3 btn-primary" type="submit">Изменить</button>
    </div>

</form>

<a href="{% url 'task_list' %}" class="btn btn-secondary">Назад</a>

{% endblock %}
